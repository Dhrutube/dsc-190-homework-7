stages:
  clean:
    cmd: uv run src/clean.py
    deps:
    - data/raw/events.csv
    outs:
    - data/clean/events.csv
  transform:
    cmd: uv run src/transform.py
    deps:
    - data/clean/events.csv
    outs:
    - data/transformed/events.csv
  features:
    cmd: uv run src/features.py
    deps:
    - data/transformed/events.csv
    outs:
    - data/features/events.csv
